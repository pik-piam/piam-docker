on:
  push:
    branches: [main]
    paths:
      - Dockerfile
  workflow_dispatch:

name: build-image.yaml

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/codezeilen/piam-ci-test-image:latest
            ghcr.io/codezeilen/piam-ci-test-image:${{ github.sha }}
